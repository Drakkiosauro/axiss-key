<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiss Hub | Key System Personalizado</title>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 90%; max-width: 450px; }
        h1 { color: #00ff88; }
        input { background: #000; border: 1px solid #00ff88; color: #fff; padding: 10px; width: 80%; border-radius: 5px; margin-bottom: 20px; text-align: center; }
        .key-box { background: #000; border: 2px solid #00ff88; color: #00ff88; font-family: monospace; font-size: 22px; padding: 15px; border-radius: 8px; display: none; margin-top: 20px; }
        button { background: #00ff88; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AXISS HUB</h1>
        <p>Insira o ID que o Loader copiou:</p>
        <input type="text" id="hwidInput" placeholder="Cole o ID aqui...">
        <br>
        <button onclick="generateKey()">GERAR MINHA KEY</button>
        <div class="key-box" id="keyDisplay"></div>
    </div>

    <script>
        function generateKey() {
            const hwid = document.getElementById('hwidInput').value.trim();
            if (!hwid) return alert("Cole seu ID!");
            
            const now = new Date();
            const day = ("0" + now.getUTCDate()).slice(-2) + ("0" + (now.getUTCMonth() + 1)).slice(-2) + now.getUTCFullYear();
            const secret = "DRAKKIO_SECRET_99";
            
            // Lógica de Hash combinando HWID + DATA + SEGREDO
            let combined = hwid + day + secret;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = (hash * 31 + combined.charCodeAt(i)) % 10000000;
            }
            
            const display = document.getElementById('keyDisplay');
            display.innerText = "AXISS-" + Math.abs(hash);
            display.style.display = "block";
        }
    </script>
</body>
</html>
